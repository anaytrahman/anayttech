<nav class="navbar navbar-expand-lg fixed-top app-navbar" [class.app-navbar--scrolled]="isScrolled()">
  <div class="container">
    <a class="navbar-brand app-navbar__brand" role="button" (click)="scrollToSection('home')">
      <img class="app-navbar__logo" [src]="APP_Logo.title_logo" alt="App title logo" />
    </a>

    <button
      class="navbar-toggler app-navbar__toggler"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation"
    >
      <i class="fa-solid" [ngClass]="isMenuOpen() ? 'fa-xmark' : 'fa-bars'"></i>
    </button>
     
    <div class="app-navbar__collapse" [class.app-navbar__collapse--open]="isMenuOpen()">
      <ul class="navbar-nav app-navbar__nav">
        <li class="nav-item" *ngFor="let link of navLinks">
          <a
            class="nav-link app-navbar__link"
            [class.active]="isActive(link.fragment)"
            role="button"
            (click)="scrollToSection(link.fragment)"
          >
            {{ link.label }}
          </a>
        </li>
      </ul>

      <a class="btn-outline-glow app-navbar__resume" (click)="downloadResume()" download>
        <i class="fa-solid fa-file-arrow-down"></i> Resume
      </a>
    </div>
  </div>
</nav>
